<!DOCTYPE html>
<html class="dark" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Sahabat Bradpitt - Cine-Noir Database{% endblock %}</title>
    
    <!-- Scripts & Fonts CDNs -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#c7c5d1",
                        "on-primary-fixed-variant": "#48454f",
                        "surface-tint": "#c9c4d0",
                        "primary-fixed": "#e5e0ec",
                        "on-primary": "#312f38",
                        "surface-container": "#201f20",
                        "on-error": "#690005",
                        "surface-container-highest": "#363435",
                        "inverse-primary": "#605d67",
                        "on-tertiary-container": "#a59f8e",
                        "on-surface": "#e5e1e2",
                        "on-secondary-fixed-variant": "#464650",
                        "inverse-on-surface": "#313031",
                        "outline": "#938f95",
                        "secondary": "#c7c5d1",
                        "on-background": "#e5e1e2",
                        "surface-container-high": "#2b2a2a",
                        "tertiary-container": "#3a3629",
                        "surface-bright": "#3a3939",
                        "error": "#ffb4ab",
                        "surface-container-lowest": "#0e0e0f",
                        "tertiary": "#cdc6b4",
                        "surface-variant": "#363435",
                        "primary": "#c9c4d0",
                        "inverse-surface": "#e5e1e2",
                        "on-surface-variant": "#c9c5cb",
                        "on-secondary-fixed": "#1a1b24",
                        "secondary-container": "#484852",
                        "surface-dim": "#141314",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#4b4739",
                        "on-primary-container": "#a19da8",
                        "primary-container": "#37353e",
                        "primary-fixed-dim": "#c9c4d0",
                        "tertiary-fixed-dim": "#cdc6b4",
                        "error-container": "#93000a",
                        "on-tertiary-fixed": "#1f1b10",
                        "on-secondary-container": "#b9b7c3",
                        "surface": "#141314",
                        "on-primary-fixed": "#1c1a23",
                        "outline-variant": "#48464b",
                        "secondary-fixed": "#e3e1ee",
                        "on-tertiary": "#343024",
                        "tertiary-fixed": "#eae2cf",
                        "surface-container-low": "#1c1b1c",
                        "background": "#141314",
                        "on-secondary": "#2f3039"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "stack-sm": "8px",
                        "margin-page": "64px",
                        "unit": "4px",
                        "stack-lg": "32px",
                        "navbar-height": "64px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "section-title": ["Playfair Display"],
                        "meta-label": ["DM Sans"],
                        "hero-display": ["Playfair Display"],
                        "body-main": ["DM Sans"],
                        "card-title": ["DM Sans"]
                    },
                    "fontSize": {
                        "section-title": ["28px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "meta-label": ["13px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "400"}],
                        "hero-display": ["52px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-main": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "card-title": ["18px", {"lineHeight": "1.4", "fontWeight": "500"}]
                    }
                },
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-[#37353E] text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">

    <!-- TopNavBar -->
    <nav class="bg-[#37353E]/95 backdrop-blur-md fixed top-0 w-full h-[80px] z-50 border-b border-white/5 transition-all duration-300">
        <div class="flex justify-between items-center px-6 md:px-12 max-w-[1440px] mx-auto h-full relative">
            
            <!-- Logo -->
            <div class="text-2xl font-bold tracking-tight text-white font-['Noto_Serif']">
                <a href="/">Sahabat Bradpitt</a>
            </div>
            
            <!-- Navigation Links -->
            <div class="hidden md:flex items-center gap-10 absolute left-1/2 -translate-x-1/2">
                <a id="nav-home" class="text-[#D3DAD9]/60 font-['Noto_Serif'] text-lg hover:text-white transition-all pb-0.5" href="/">Home</a>
                <a id="nav-movies" class="text-[#D3DAD9]/60 font-['Noto_Serif'] text-lg hover:text-white transition-all pb-0.5" href="/movies/">Movies</a>
                <a id="nav-actors" class="text-[#D3DAD9]/60 font-['Noto_Serif'] text-lg hover:text-white transition-all pb-0.5" href="/actors/">Actors</a>
            </div>
            
            <!-- Right Aligned Icons -->
            <div class="flex items-center gap-6">
                <a href="/movies/?search=1" class="text-[#D3DAD9] hover:text-white transition-all">
                    <span class="material-symbols-outlined text-2xl">search</span>
                </a>
                <a href="/profile/" class="text-[#D3DAD9] hover:text-white transition-all">
                    <span class="material-symbols-outlined text-2xl">account_circle</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-[#141314] text-[#D3DAD9]/60 py-16 px-6 md:px-24 border-t border-white/5 w-full">
        <div class="max-w-[1440px] mx-auto flex flex-col md:flex-row justify-between items-start gap-12">
            <!-- Left Side: Logo and Copyright -->
            <div class="flex flex-col gap-4">
                <div class="text-2xl font-bold tracking-tight text-white font-['Noto_Serif']">
                    Sahabat Bradpitt
                </div>
                <div class="font-['Noto_Serif'] text-sm opacity-40">
                    © 2026 Sahabat Bradpitt. For the love of cinema.
                </div>
            </div>
            <!-- Right Side: Links Grid -->
            <div class="grid grid-cols-2 gap-x-24 gap-y-4">
                <div class="flex flex-col gap-4">
                    <a class="font-['Noto_Serif'] text-sm hover:text-white transition-colors opacity-50" href="#">About Us</a>
                    <a class="font-['Noto_Serif'] text-sm hover:text-white transition-colors opacity-50" href="#">Press Kit</a>
                </div>
                <div class="flex flex-col gap-4">
                    <a class="font-['Noto_Serif'] text-sm hover:text-white transition-colors opacity-50" href="#">Privacy Policy</a>
                    <a class="font-['Noto_Serif'] text-sm hover:text-white transition-colors opacity-50" href="#">Terms of Service</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const pathname = window.location.pathname;
            
            const links = {
                'nav-home': '/',
                'nav-movies': '/movies/',
                'nav-actors': '/actors/'
            };

            Object.entries(links).forEach(([id, path]) => {
                const el = document.getElementById(id);
                if (el) {
                    const isMatch = path === '/' ? pathname === '/' : pathname.startsWith(path);
                    if (isMatch) {
                        el.classList.remove("text-[#D3DAD9]/60");
                        el.classList.add("text-white", "border-b-2", "border-[#715A5A]");
                    } else {
                        el.classList.add("text-[#D3DAD9]/60");
                        el.classList.remove("text-white", "border-b-2", "border-[#715A5A]");
                    }
                }
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
