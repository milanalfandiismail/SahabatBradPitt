<!-- ======================= 1. MOVIES SECTION ======================= -->
<div id="section-movies" class="hidden flex flex-col gap-8">
    <!-- Header -->
    <div class="flex justify-between items-center border-b border-white/5 pb-6">
        <div class="flex flex-col gap-1">
            <h1 class="font-['Playfair_Display'] text-3xl text-stone-100 font-bold tracking-tight">Katalog &
                Manajemen Film</h1>
            <p class="font-['DM_Sans'] text-xs text-[#c9c5cb]/70">Tambah, sunting, ajukan persetujuan, atau
                hapus film dari database.</p>
        </div>
    </div>

    <!-- SUB-VIEW 1.1: FILM LIST VIEW -->
    <div id="view-manage" class="flex flex-col gap-6">
        <!-- Controls Bar -->
        <div class="bg-[#201f20] rounded-lg p-5 border border-white/5 shadow-md flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-[70%]">
                <div class="relative flex-grow flex items-center">
                    <span id="manage-search-icon-btn" class="material-symbols-outlined absolute left-3 text-stone-400 hover:text-white cursor-pointer text-base transition-colors">search</span>
                    <input id="manage-search" class="w-full bg-[#141314] border border-white/10 rounded-md py-2 pl-10 pr-[70px] text-xs text-stone-200 placeholder-stone-500 focus:border-[#715A5A] focus:ring-1 focus:ring-[#715A5A] focus:outline-none transition-all" placeholder="Cari film berdasarkan judul..." type="text" />
                    <button id="manage-search-submit-btn" class="absolute right-1.5 bg-[#715A5A] hover:bg-[#8A6E6E] text-white text-[10px] font-semibold px-2.5 py-1.5 rounded transition-all">Cari</button>
                </div>
                <div class="w-full sm:w-[180px] shrink-0">
                    <select id="manage-status-filter" class="w-full bg-[#141314] border border-white/10 rounded-md py-2 px-3 text-xs text-stone-200 focus:border-[#715A5A] focus:ring-1 focus:ring-[#715A5A] focus:outline-none">
                        <option value="">Semua Status</option>
                        <option value="draft">Draft</option>
                        <option value="pending_approval">Pending Approval</option>
                        <option value="published">Published</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
            </div>
            <button id="add-film-btn" class="w-full md:w-auto px-5 py-2 rounded font-semibold text-xs text-white bg-[#715A5A] hover:bg-[#8A6E6E] transition-all flex items-center justify-center gap-1.5 shadow-md" type="button">
                <span class="material-symbols-outlined text-sm">add_circle</span> Tambah Film
            </button>
        </div>

        <!-- Table Content -->
        <div class="bg-[#201f20] rounded-lg border border-white/5 shadow-md overflow-hidden flex flex-col">
            <div class="overflow-x-auto custom-scroll w-full">
                <table class="w-full text-left text-xs border-collapse">
                    <thead>
                        <tr class="bg-[#141314] border-b border-white/5 text-[#c9c5cb]/40 font-bold uppercase tracking-wider text-[10px]">
                            <th class="p-4 w-[80px] text-center">POSTER</th>
                            <th class="p-4 min-w-[200px]">JUDUL FILM</th>
                            <th class="p-4 w-[100px] text-center">TAHUN</th>
                            <th class="p-4 min-w-[150px]">GENRE</th>
                            <th class="p-4 w-[150px] text-center">STATUS</th>
                            <th class="p-4 w-[180px] text-center">AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="films-table-body"><!-- Dynamic rows --></tbody>
                </table>
            </div>
            <div id="table-loading" class="hidden py-16 text-center text-[#c9c5cb]/50 flex flex-col items-center justify-center gap-2">
                <span class="material-symbols-outlined animate-spin text-3xl">sync</span>
                <p class="text-xs">Memuat katalog...</p>
            </div>
            <div id="table-empty" class="hidden py-16 text-center text-[#c9c5cb]/40 italic text-xs">Tidak ada data film ditemukan.</div>
            <div class="px-6 py-4 bg-[#141314]/30 border-t border-white/5 flex flex-col sm:flex-row justify-between items-center gap-4">
                <span id="manage-pagination-info" class="text-[11px] text-[#c9c5cb]/40 font-medium">Menampilkan 0 film</span>
                <div id="manage-pagination-controls" class="flex items-center gap-1"><!-- Dynamic controls --></div>
            </div>
        </div>
    </div>

    <!-- SUB-VIEW 1.2: FILM CRUD EDITOR FORM -->
    {% include "admin/partials/movies_editor.html" %}
</div>
