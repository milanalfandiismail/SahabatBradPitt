{% extends "base.html" %}

{% block title %}Sahabat Bradpitt - All Actors{% endblock %}

{% block content %}
<main class="flex-grow pt-[120px] pb-24 px-4 sm:px-6 md:px-12 max-w-[1440px] w-full mx-auto">
    <!-- Breadcrumbs -->
    <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-[#D3DAD9]/70 font-['DM_Sans'] text-xs mb-6">
        <a class="hover:text-white transition-colors" href="/">Home</a>
        <span class="material-symbols-outlined text-[16px]">chevron_right</span>
        <span class="text-white">Actors</span>
    </nav>
    
    <!-- Header -->
    <header class="mb-12 flex flex-col md:flex-row md:items-end md:justify-between gap-6">
        <div>
            <h1 class="font-['Playfair_Display'] text-3xl md:text-4xl text-white font-bold tracking-tight">Pemain & Sutradara</h1>
            <p class="font-['DM_Sans'] text-sm text-[#D3DAD9]/80 mt-2">Daftar tokoh-tokoh utama di balik karya-karya legendaris Hollywood.</p>
        </div>
        <!-- Search Sineas -->
        <div class="relative w-full md:w-80 shrink-0 flex items-center">
            <span id="search-icon-btn" class="material-symbols-outlined absolute left-3 text-stone-400 hover:text-white cursor-pointer text-lg transition-colors">search</span>
            <input id="search-actors" class="w-full bg-[#201f20] border border-white/10 rounded-md py-2.5 pl-10 pr-[70px] text-sm text-stone-200 placeholder-stone-500 focus:border-[#715A5A] focus:ring-1 focus:ring-[#715A5A] focus:outline-none transition-all" placeholder="Cari sineas..." type="text"/>
            <button id="search-submit-btn" class="absolute right-1.5 bg-[#715A5A] hover:bg-[#8A6E6E] text-white text-xs font-semibold px-3 py-1.5 rounded transition-all">Cari</button>
        </div>
    </header>

    <!-- Actor Grid -->
    <div id="actors-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8">
        <!-- Film cards will go here -->
    </div>
    
    <!-- Pagination Controls -->
    <div id="pagination-controls" class="mt-12 flex flex-wrap justify-center items-center gap-2 font-['DM_Sans'] text-sm">
        <!-- Dynamic page buttons -->
    </div>
</main>
{% endblock %}

{% block extra_js %}
<script src="/static/js/home_actors.js?v=114"></script>
<script src="/static/js/actors/actor_list.js?v=114"></script>
{% endblock %}
